<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CallCode App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
    <h2>Login</h2>

    <input id="name" placeholder="Name">
    <input id="callcode" placeholder="Callcode">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<div id="callUI" style="display:none;">

    <h1 class="title">Eclipse Calls</h1>

    <input id="target" placeholder="Enter callcode">
    <button onclick="callUser()">Call</button>

    <div id="incoming" style="display:none;">
        <p>Incoming Call</p>
        <button onclick="acceptCall()">Accept</button>
    </div>

    <div class="videos">
        <video id="localVideo" autoplay muted></video>
        <video id="remoteVideo" autoplay></video>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
