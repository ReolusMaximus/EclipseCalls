<!DOCTYPE html>
<html lang="en">
<head>
    <title>CallCode</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="noise"></div>

<div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-dot"></span>
            <span class="logo-text">CallCode</span>
        </div>

        <div class="sidebar-bottom">
            <div class="status-pill" id="statusPill">
                <span class="status-dot"></span>
                <span id="statusText">Offline</span>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main">

        <!-- Login / Register Panel -->
        <div id="login" class="panel panel--auth">
            <div class="panel-header">
                <h1 class="panel-title">Connect.</h1>
                <p class="panel-sub">Register or log in with your callcode to start a call.</p>
            </div>

            <div class="form-group">
                <label class="form-label">Name</label>
                <input id="name" class="form-input" placeholder="Your name" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label">Callcode</label>
                <input id="callcode" class="form-input mono" placeholder="e.g. falcon-7" autocomplete="off">
            </div>

            <div class="btn-row">
                <button class="btn btn--ghost" onclick="register()">Register</button>
                <button class="btn btn--primary" onclick="login()">Log in →</button>
            </div>
        </div>

        <!-- Call UI -->
        <div id="callUI" class="panel panel--call" style="display:none;">
            <div class="panel-header">
                <h2 class="panel-title">New call</h2>
                <p class="panel-sub">Enter the callcode of who you want to reach.</p>
            </div>

            <div class="form-group">
                <label class="form-label">Callcode</label>
                <input id="target" class="form-input mono" placeholder="e.g. falcon-7" autocomplete="off">
            </div>

            <button class="btn btn--primary btn--wide" onclick="callUser()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                Start call
            </button>
        </div>

        <!-- Incoming call -->
        <div id="incoming" class="panel panel--incoming" style="display:none;">
            <div class="incoming-ring">
                <div class="ring ring1"></div>
                <div class="ring ring2"></div>
                <div class="ring ring3"></div>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </div>
            <p class="incoming-label">Incoming call</p>
            <h2 id="caller" class="incoming-caller"></h2>
            <button class="btn btn--accept" onclick="acceptCall()">Accept</button>
        </div>

        <!-- Video area -->
        <div class="video-stage">
            <div class="video-wrapper video-wrapper--remote">
                <video id="remoteVideo" autoplay></video>
                <div class="video-label">Remote</div>
            </div>
            <div class="video-wrapper video-wrapper--local">
                <video id="localVideo" autoplay muted></video>
                <div class="video-label">You</div>
            </div>
        </div>

    </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

<script>
    // Update status pill on login
    const _origLogin = window.login;
    document.querySelector('[onclick="login()"]')?.addEventListener('click', () => {
        const code = document.getElementById('callcode').value;
        if (code) {
            document.getElementById('statusText').textContent = code;
            document.getElementById('statusPill').classList.add('online');
        }
    });
</script>

</body>
</html>
